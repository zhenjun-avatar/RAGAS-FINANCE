<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>财务问答结果报告</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --head: #eef4ff;
      --accent: #2563eb;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px 40px;
    }
    h1, h2 {
      margin: 0 0 12px;
    }
    h1 {
      font-size: 30px;
    }
    h2 {
      font-size: 20px;
      color: var(--accent);
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 16px;
    }
    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px 22px;
      margin-top: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: var(--head);
      font-weight: 600;
    }
    .text-block {
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    .answer {
      font-size: 15px;
    }
    ul {
      margin: 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="page">
