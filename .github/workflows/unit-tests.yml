# This workflow will run unit tests for the current project

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: # Allows triggering the workflow manually in GitHub UI

# If another push to the same PR or branch happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      # Full src/ lint backlog; enforce style on tests (and expand later).
      - name: Lint with ruff
        run: uv run ruff check tests
      # Full-tree --strict is not clean yet; gate the locale module covered by unit tests.
      - name: Lint with mypy
        run: uv run mypy --strict --follow-imports=skip src/agent/tools/finance/report_locale.py
      - name: Check README spelling
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_file: .codespellignore
          path: README.md
      - name: Check code spelling
        uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_file: .codespellignore
          path: src/
          # SEC inline-XBRL fixtures: namespace tokens (e.g. xmlns:leas, xmlns:te) and
          # words split across <font> spans are not spelling errors to "fix".
          # logs/report/debug: runtime artifacts often contain truncated tokens in JSON/JSONL.
          skip: "./.git,**/*.htm,**/agent/logs/**,**/agent/report/**,**/agent/debug/**"
      - name: Run tests with pytest
        run: uv run pytest tests/unit_tests
